<svg width="848" height="570" viewBox="0 0 848 570" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Stylized Map -->
  <rect width="848" height="570" rx="40" fill="transparent"/>
  
  <!-- Subtle Grid/Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(59, 130, 246, 0.05)" stroke-width="1"/>
    </pattern>
    
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="848" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="848" height="570" rx="48" fill="url(#paint0_linear)"/>
  <rect width="848" height="570" rx="48" fill="url(#grid)"/>

  <!-- Connecting Lines (Dashed Travel Paths) -->
  <path d="M150 150 Q 300 200 424 285" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8 8" opacity="0.4" stroke-linecap="round"/>
  <path d="M700 120 Q 550 180 424 285" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8 8" opacity="0.4" stroke-linecap="round"/>
  <path d="M200 450 Q 350 400 424 285" stroke="#6366F1" stroke-width="3" stroke-dasharray="8 8" opacity="0.4" stroke-linecap="round"/>
  <path d="M650 480 Q 500 420 424 285" stroke="#6366F1" stroke-width="3" stroke-dasharray="8 8" opacity="0.4" stroke-linecap="round"/>

  <!-- Participant Markers (Dots/Pins) -->
  <circle cx="150" cy="150" r="12" fill="#3B82F6" filter="url(#glow)"/>
  <circle cx="150" cy="150" r="6" fill="white"/>
  
  <circle cx="700" cy="120" r="10" fill="#3B82F6" opacity="0.8"/>
  <circle cx="700" cy="120" r="5" fill="white"/>

  <circle cx="200" cy="450" r="10" fill="#6366F1" opacity="0.8"/>
  <circle cx="200" cy="450" r="5" fill="white"/>

  <circle cx="650" cy="480" r="12" fill="#6366F1" filter="url(#glow)"/>
  <circle cx="650" cy="480" r="6" fill="white"/>

  <!-- The Midpoint (Center Highlight) -->
  <g filter="url(#glow)">
    <circle cx="424" cy="285" r="35" fill="white" fill-opacity="0.1"/>
    <circle cx="424" cy="285" r="25" fill="#4F46E5"/>
    <path d="M424 270V300M409 285H439" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="424" cy="285" r="8" fill="white" opacity="0.5">
       <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Floating UI Icons -->
  <rect x="580" y="240" width="120" height="40" rx="12" fill="white" fill-opacity="0.8" filter="url(#glow)"/>
  <text x="595" y="265" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1F2937">중간 지점 발견!</text>
  
  <rect x="120" y="300" width="140" height="50" rx="15" fill="white" fill-opacity="0.7"/>
  <circle cx="145" cy="325" r="12" fill="#3B82F6"/>
  <rect x="165" y="318" width="80" height="6" rx="3" fill="#3B82F6" opacity="0.3"/>
  <rect x="165" y="328" width="50" height="6" rx="3" fill="#3B82F6" opacity="0.2"/>
</svg>
